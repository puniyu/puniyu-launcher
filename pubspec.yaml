name: puniyu_launcher
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shadcn_ui: ^0.54.0
  lucide_icons_flutter: ^3.1.14+2
  window_manager: ^0.5.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  rename_app: ^1.6.6

flutter:
  uses-material-design: false

  assets:
    - assets/icons/icon.png

  fonts:
    - family: DouyinSans
      fonts:
        - asset: assets/fonts/DouyinSans.otf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  windows:
    generate: true
    icon_size: 48
  macos:
    generate: true
    icon_size: 48

config_name:
  name: "puniyu-launcher"